<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Новости</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">
    <nav class="navbar bg-white border-bottom border-2 border-primary shadow-sm">
        <div class="container">
            <h1 class="navbar-brand mb-0 fs-5 fw-bold">
                <i class="bi bi-clipboard-list me-2"></i>Управление новостями
            </h1>
            <div class="d-flex align-items-center gap-2">
                <a href="{% url 'admin_post_create' %}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Новый пост
                </a>
                <a href="{% url 'admin_users' %}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-people me-1"></i>Пользователи
                </a>
                <a href="{% url 'admin_api_keys' %}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-key me-1"></i>API-ключи
                </a>
                <a href="/" class="btn btn-outline-secondary btn-sm" target="_blank">
                    <i class="bi bi-globe me-1"></i>Сайт
                </a>
                <form method="post" action="{% url 'admin_logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">Выйти</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container py-4 flex-grow-1">
        {% if posts %}
            <div class="table-responsive">
                <table class="table table-hover align-middle bg-white rounded shadow-sm overflow-hidden">
                    <thead class="table-primary">
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>Заголовок</th>
                            <th>Дата создания</th>
                            <th class="text-end pe-3">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for post in posts %}
                            <tr>
                                <td class="ps-3 text-secondary">{{ post.id }}</td>
                                <td>{{ post.title }}</td>
                                <td><span class="date-ts text-secondary small" data-ts="{{ post.ts }}"></span></td>
                                <td class="text-end pe-3">
                                    <a href="{% url 'admin_post_edit' post.id %}" class="btn btn-sm btn-outline-secondary" title="Редактировать">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a href="{% url 'admin_post_delete' post.id %}" class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Удалить пост «{{ post.title }}»?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        {% else %}
            <div class="text-center py-5 text-muted">
                <i class="bi bi-newspaper display-4 d-block mb-3"></i>
                <p class="fs-5">Новостей нет. Создайте первую!</p>
                <a href="{% url 'admin_post_create' %}" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-1"></i>Создать пост
                </a>
            </div>
        {% endif %}
    </main>

    <script>
        document.querySelectorAll('.date-ts').forEach(function(el) {
            var ts = parseInt(el.dataset.ts);
            if (!ts) return;
            var d = new Date(ts * 1000);
            var months = [
                'января','февраля','марта','апреля','мая','июня',
                'июля','августа','сентября','октября','ноября','декабря'
            ];
            var day = d.getDate();
            var month = months[d.getMonth()];
            var year = d.getFullYear();
            var hh = String(d.getHours()).padStart(2, '0');
            var mm = String(d.getMinutes()).padStart(2, '0');
            el.textContent = day + ' ' + month + ' ' + year + ', ' + hh + ':' + mm;
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Админ-панель</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex vh-100 align-items-center justify-content-center" style="background: #f0f2f5;">
    <div class="card shadow-lg border-0" style="width: 380px;">
        <div class="card-body p-4">
            <h1 class="fs-4 fw-bold text-center mb-4">
                <i class="bi bi-shield-lock me-2"></i>Вход
            </h1>
            <form method="post">
                {% csrf_token %}
                {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}
                <div class="mb-3">
                    <label for="username" class="form-label">Логин</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
        </div>
    </div>
</body>
</html>
